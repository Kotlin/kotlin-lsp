if (!Boolean.getBoolean("idea.sync.active")) {
    throw new IllegalStateException("Expected idea.sync.active=true, got: ${System.getProperty("idea.sync.active")}")
}

if (!Boolean.getBoolean("com.jetbrains.ls.imports.gradle")) {
    throw new IllegalStateException("Expected com.jetbrains.ls.imports.gradle=true, got: ${System.getProperty("com.jetbrains.ls.imports.gradle")}")
}
